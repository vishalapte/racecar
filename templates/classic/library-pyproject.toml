# templates/classic/library-pyproject.toml — the library pyproject.
#
# Where to put this depends on the project shape (see racecar's
# arch-coherence/PACKAGING.md, "Scope"):
#
#   shape src           -> copy to:  pyproject.toml         (repo root)
#   shape pypkg         -> copy to:  pypkg/src/pyproject.toml
#   shape pypkg+djapp   -> copy to:  pypkg/src/pyproject.toml
#                          (companion: djapp/pyproject.toml from djapp-pyproject.toml)
#   shape djapp         -> not applicable; use root pyproject.toml directly
#                          for the deployable
#
# Substitute placeholders enclosed in `<...>`:
#   <project_name>       e.g. "athena"
#   <x.y.z>              e.g. "0.2.0" -- must match the VERSION file at repo root
#   <one-line description>
#   <your name>          author name
#   <email>              author email
#   <root>               top-level Python package, e.g. "athena"
#   <runtime dep>        each direct runtime import, e.g. "numpy>=2.0"
#   <where>              setuptools package source path; see table below
#   layered DAG rows     replace with the project's actual peers and leaves
#
# Lockfile: generated from this file by `pip-tools` (`make lock`). The
# committed `requirements.txt` is the resolved lockfile.
#
# Dev deps are declared in PEP 735 `[dependency-groups]`, not in
# `[project.optional-dependencies]`. Requires pip >= 25.1 to install the
# group: `pip install --group dev`.

[project]
name = "<project_name>"
version = "<x.y.z>"
description = "<one-line description>"
requires-python = ">=3.12"
authors = [{ name = "<your name>", email = "<email>" }]
dependencies = [
    # direct runtime imports only -- pip-tools resolves transitives into
    # requirements.txt. Pin major / minor; let pip-compile pick the patch.
    "<runtime dep>",
]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

# Canonical dev tool set per racecar's arch-coherence/PACKAGING.md, the
# "Dev tooling" rules (PEP 735 dependency group).
# Identical across racecar projects; modifying this list is a standards-change
# conversation, not a project-by-project decision.
[dependency-groups]
dev = [
    "black",
    "isort",
    "pylint",
    "pylint-pytest",
    "mypy",
    "pytest",
    "pytest-cov",
    "pip-audit",
    "import-linter",
    "pip-tools",
    "pre-commit",
    "validate-pyproject",
]
django = [
    # Django-specific dev tools. Install with: make install-django
    "coverage>=7.4",              # Django test runner needs coverage directly (pytest-cov is pytest-only)
    "django-debug-toolbar>=4.0",
    "drf-spectacular[sidecar]>=0.27",
    "pylint-django>=2.5",
]

# Shape-specific. See racecar's arch-coherence/PACKAGING.md, "Scope":
#   shape src           ->  where = ["src"]
#   shape pypkg         ->  where = ["."]              (relative to pypkg/src/)
#   shape pypkg+djapp   ->  where = ["."]              (relative to pypkg/src/)
[tool.setuptools.packages.find]
where = ["<where>"]

[tool.black]
target-version = ["py312"]

[tool.isort]
profile = "black"

[tool.pylint."MESSAGES CONTROL"]
# Canonical disable set — identical across racecar projects, enforced by
# scripts/check_packaging.py (see arch-coherence/PACKAGING.md, "pylint canon").
# Every entry below must be present. A project may append its own disables, but
# the two docstring codes missing-class-docstring (C0115) and
# missing-function-docstring (C0116) must NOT appear here: class and function
# docstrings are required. Module docstrings are not — a module's role lives in
# its subsystem README / DESIGN / SYSTEM / CLAUDE doc.
disable = [
    # meta / pre-commit plumbing — never a real finding
    "raw-checker-failed",
    "bad-inline-option",
    "locally-disabled",
    "file-ignored",
    "suppressed-message",
    "useless-suppression",
    "deprecated-pragma",
    "use-symbolic-message-instead",
    # idiomatic-code false positives
    "duplicate-code",  # R0801: argparse / pydantic / dataclass boilerplate
    "use-implicit-booleaness-not-comparison-to-string",
    "use-implicit-booleaness-not-comparison-to-zero",
    # module docstrings — covered by the subsystem's README / DESIGN / SYSTEM / CLAUDE doc
    "missing-module-docstring",
]

[tool.pylint.BASIC]
# Names exempt from the docstring requirement: private (_x), pytest functions
# (test_*), and Test* classes. Everything else public requires a docstring.
no-docstring-rgx = "^_|^test_|^Test"
# Functions / classes with fewer lines than this are exempt (trivial one-liners).
docstring-min-length = 6

[tool.pylint.DESIGN]
# Raised caps, not disables — keep the backstop, allow cohesive data/CLI builders.
max-args = 6
max-attributes = 10
max-locals = 25
max-branches = 17
max-bool-expr = 8

[tool.pylint.SIMILARITIES]
# Default 4 flags idiomatic per-verb CLI scaffolding; 12 clears those.
min-similarity-lines = 12
ignore-docstrings = true

[tool.pylint.MAIN]
py-version = "3.12"
# Django projects (shape pypkg+djapp / djapp) append "pylint_django".
load-plugins = ["pylint_pytest"]

[tool.pylint.MASTER]
# Repo-relative regexes to skip. The doc-coherence pre-pass (scripts/check_docs.py)
# also reads this list: the check scripts vendored under scripts/ are copied
# verbatim from racecar and carry §N citations to racecar's own canon, which do
# not resolve in this repo. Excluding scripts/ keeps the pre-pass policing this
# project's own docs and config, not vendored racecar internals.
ignore-paths = ["^scripts/"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests", "."]

[tool.mypy]
python_version = "3.12"
strict = true

[tool.coverage.run]
# Measure coverage of the library package only. Substitute <root>.
source = ["<root>"]
branch = true

[tool.coverage.report]
# Skip uninteresting lines from the report.
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@(abc\\.)?abstractmethod",
]
# Projects may add `fail_under = N` here to gate `make coverage` on a
# minimum percentage; racecar does not impose a default threshold.

[tool.importlinter]
root_package = "<root>"

[[tool.importlinter.contracts]]
name = "<root>: layered DAG"
type = "layers"
layers = [
    # top -- consumers (depend on everything below)
    "<root>.<consumer_a> | <root>.<consumer_b>",
    # middle -- data / types peers (independent of each other; may depend on leaves)
    "<root>.<data_a> | <root>.<data_b>",
    # leaf -- foundation (no internal dependencies)
    "<root>.<leaf>",
]
