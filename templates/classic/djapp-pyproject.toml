# templates/classic/djapp-pyproject.toml -- the Django app pyproject.
#
# Applies to Shape pypkg+djapp only (see racecar's arch-coherence/PACKAGING.md,
# "Scope"). Copy to:
#
#   djapp/pyproject.toml
#
# This file is intentionally minimal: it exists so pip-tools can resolve a
# `djapp/requirements.txt` lockfile and so the racecar checker can audit
# the declared Django runtime deps.
#
# It deliberately does not declare:
#   [project]         -- djapp is not a publishable package; no version, no name
#   [build-system]    -- djapp is not pip-installable as a wheel; it runs via manage.py
#
# Tool config ([tool.black], [tool.isort]) IS declared here even though the
# library pyproject (pypkg/src/pyproject.toml) also carries it. pre-commit
# discovers config by walking up from each file — for files under djapp/ it
# finds this file first. Without matching tool sections here, pre-commit's
# isort/black would fall back to defaults and fight with `make fmt`.
#
# The import-linter contract in the library pyproject prevents the library
# from importing django even though django is installed in the shared venv.
#
# Requires pip >= 25.1 for `pip install --group runtime`. Lockfile generated
# via `make lock` (runs `pip-compile --group runtime djapp/pyproject.toml`).

[tool.black]
target-version = ["py312"]
# line-length = 88  # match pypkg/src/pyproject.toml if overridden there

[tool.isort]
profile = "black"
# line_length = 88        # match black if overridden
# known_first_party = []  # add djapp-specific package names here

[dependency-groups]
runtime = [
    # Django and its app-runtime peers. Pin major; let pip-compile pick patch.
    "django>=5.0,<6.0",
    # Add the rest of the djapp's runtime dependencies here.
    # "djangorestframework>=3.15",
]
