# templates/classic/pre-commit-config.yaml — copy to project root as
# `.pre-commit-config.yaml` (add leading dot on copy).
#
# After copying, run `pre-commit autoupdate` to bump the pinned revs to
# current upstream versions. The pins below are the latest known at template
# write time; they intentionally fall out of date. Schedule a periodic
# `pre-commit autoupdate` in the project (e.g. as part of CHANGELOG cuts).

repos:
  # isort first (orders imports), then black (formats the result, including the
  # reordered imports). Reverse order would force black to run twice.
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/seddonym/import-linter
    rev: v2.1
    hooks:
      - id: import-linter

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject

  - repo: local
    hooks:
      - id: no-upward-imports-in-business-modules
        name: arch-coherence/PYTHON.md §1 — business modules must not import from root package directly
        entry: python scripts/check_upward_imports.py
        language: python
        types: [python]
        exclude: '(__main__|__init__)\.py$'

      - id: doc-coherence-mechanical-pre-pass
        name: doc-coherence/README.md — mechanical pre-pass (link / §N / vocabulary drift)
        entry: python scripts/check_docs.py
        language: python
        pass_filenames: false
        always_run: true

      - id: no-cross-module-string-relations
        name: arch-coherence/DJANGO.md §2 — no cross-module string ORM relations (skipped if no manage.py)
        entry: bash -c 'if [ -f manage.py ]; then python scripts/check_string_relations.py; fi'
        language: system
        pass_filenames: false
        always_run: true
